# Configuração para produção (Render)

# Construa a URL JDKC a partir das variáveis separadas
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Suas outras configurações...
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
jwt.secret=${JWT_SECRET}


# JPA - não criar tabelas em produção (já existem)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.elessa.immigrant=INFO

# JWT - chave secreta (use uma chave forte)
jwt.expiration=86400000

# Swagger (desabilitado em produção, opcional)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true