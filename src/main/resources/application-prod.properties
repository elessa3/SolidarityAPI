# Configuração para produção (Render)
server.port=${PORT:8080}

# Banco de dados - as variáveis serão substituídas pelo Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - não criar tabelas em produção (já existem)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.elessa.immigrant=INFO

# JWT - chave secreta (use uma chave forte)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Swagger (desabilitado em produção, opcional)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true